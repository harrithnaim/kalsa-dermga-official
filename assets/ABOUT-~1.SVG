</g>
<g transform="translate(310 420)">
  <rect width="250" height="132" rx="6" fill="#fff" stroke="#dbe4e8"/>
  <path d="M40 46a18 18 0 1 1 36 0c0 13-18 32-18 32S40 59 40 46z" fill="#0e9aa3"/><circle cx="58" cy="45" r="7" fill="#fff"/>
  <text x="96" y="42" class="h">Shah Alam, Selangor</text><text x="96" y="60" class="sm">Branch</text>
