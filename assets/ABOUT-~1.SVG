<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-labelledby="aoT aoD">
<title id="aoT">Operations run from Kuantan and Shah Alam</title>
<desc id="aoD">A consignment board showing live movements, alongside markers for the Kuantan and Shah Alam offices.</desc>
<style>
.k{font:600 9px system-ui,sans-serif;fill:#0a7880;letter-spacing:.12em}
.h{font:600 12px system-ui,sans-serif;fill:#0a2540}
.c{font:400 11px system-ui,sans-serif;fill:#3d4d5a}
.sm{font:400 10px system-ui,sans-serif;fill:#8a99a6}
.b{font:600 9px system-ui,sans-serif;fill:#fff}
</style>
<rect width="600" height="600" fill="#f2f7f8"/>
<rect x="40" y="48" width="520" height="330" rx="8" fill="#fff" stroke="#dbe4e8"/>
<rect x="40" y="48" width="520" height="42" rx="8" fill="#0a2540"/><rect x="40" y="74" width="520" height="16" fill="#0a2540"/>
<text x="62" y="75" class="k" fill="#63c6cc">LIVE CONSIGNMENTS</text>
<g>
 <text x="62" y="118" class="h">KD-2026-0417</text><text x="62" y="136" class="sm">Port Klang → Kuantan · rail</text>
 <rect x="440" y="104" width="78" height="18" rx="2" fill="#0e9aa3"/><text x="479" y="117" class="b" text-anchor="middle">IN TRANSIT</text>
 <rect x="62" y="150" width="456" height="4" rx="2" fill="#e8eef1"/><rect x="62" y="150" width="290" height="4" rx="2" fill="#0e9aa3"/>
</g>
<line x1="62" y1="176" x2="538" y2="176" stroke="#eef3f5"/>
<g>
 <text x="62" y="204" class="h">KD-2026-0418</text><text x="62" y="222" class="sm">Kuantan → Port Klang · rail</text>
 <rect x="440" y="190" width="78" height="18" rx="2" fill="#edbb00"/><text x="479" y="203" class="b" text-anchor="middle" fill="#4b3a00">LOADING</text>
 <rect x="62" y="236" width="456" height="4" rx="2" fill="#e8eef1"/><rect x="62" y="236" width="96" height="4" rx="2" fill="#edbb00"/>
</g>
<line x1="62" y1="262" x2="538" y2="262" stroke="#eef3f5"/>
<g>
 <text x="62" y="290" class="h">KD-2026-0419</text><text x="62" y="308" class="sm">Kuantan port call · MV Selat Emas</text>
 <rect x="440" y="276" width="78" height="18" rx="2" fill="#dfe6ea"/><text x="479" y="289" class="b" text-anchor="middle" fill="#5b6b7a">BOOKED</text>
 <rect x="62" y="322" width="456" height="4" rx="2" fill="#e8eef1"/><rect x="62" y="322" width="34" height="4" rx="2" fill="#9db4d1"/>
</g>
<text x="62" y="358" class="sm">No physical terminal. No paper files. One record per movement.</text>

<g transform="translate(40 420)">
  <rect width="250" height="132" rx="6" fill="#fff" stroke="#dbe4e8"/>
  <path d="M40 46a18 18 0 1 1 36 0c0 13-18 32-18 32S40 59 40 46z" fill="#0a2540"/><circle cx="58" cy="45" r="7" fill="#fff"/>
  <text x="96" y="42" class="h">Kuantan, Pahang</text><text x="96" y="60" class="sm">Head office</text>
  <text x="96" y="82" class="c">Shipping agency operations</text>
  <rect x="24" y="98" width="202" height="1" fill="#eef3f5"/>
