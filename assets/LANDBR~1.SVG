<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 330" role="img" aria-labelledby="lbTitle lbDesc">
<title id="lbTitle">The Kalsa Dermaga landbridge corridor</title>
<desc id="lbDesc">Schematic of the land bridge between Port Klang on Malaysia's west coast and Kuantan Port on the east coast, connected by the East Coast Rail Link, operating under a single bill of lading.</desc>
<style>
.hd{font:600 17px Georgia,'Source Serif 4',serif;fill:#0a2540}
.sub{font:400 12px system-ui,sans-serif;fill:#5b6b7a}
.kick{font:600 10px system-ui,sans-serif;fill:#0a7880;letter-spacing:.12em}
.rail{font:600 11px system-ui,sans-serif;fill:#0a7880;letter-spacing:.06em}
.band{font:600 12px system-ui,sans-serif;fill:#0a2540}
.sea{font:400 11px system-ui,sans-serif;fill:#8a99a6}
</style>
<rect width="1200" height="330" fill="#f2f7f8"/>
<rect x="0" y="0" width="150" height="330" fill="#e4eef1"/>
<rect x="1050" y="0" width="150" height="330" fill="#e4eef1"/>
<text x="16" y="24" class="sea">Malacca Strait</text>
<text x="1184" y="24" class="sea" text-anchor="end">South China Sea</text>

<line x1="230" y1="150" x2="970" y2="150" stroke="#0e9aa3" stroke-width="3"/>
<g stroke="#9ec9ce" stroke-width="2">
<line x1="270" y1="138" x2="270" y2="162"/><line x1="330" y1="138" x2="330" y2="162"/>
<line x1="390" y1="138" x2="390" y2="162"/><line x1="450" y1="138" x2="450" y2="162"/>
<line x1="510" y1="138" x2="510" y2="162"/><line x1="570" y1="138" x2="570" y2="162"/>
<line x1="630" y1="138" x2="630" y2="162"/><line x1="690" y1="138" x2="690" y2="162"/>
<line x1="750" y1="138" x2="750" y2="162"/><line x1="810" y1="138" x2="810" y2="162"/>
<line x1="870" y1="138" x2="870" y2="162"/><line x1="930" y1="138" x2="930" y2="162"/>
</g>
<rect x="505" y="108" width="190" height="24" rx="2" fill="#0e9aa3"/>
<text x="600" y="125" class="rail" text-anchor="middle" fill="#fff">EAST COAST RAIL LINK</text>

<path d="M470 178 l-14 -7 v14 z" fill="#0a2540"/><line x1="470" y1="178" x2="600" y2="178" stroke="#0a2540" stroke-width="1.5"/>
<path d="M730 178 l14 -7 v14 z" fill="#0a2540"/><line x1="600" y1="178" x2="730" y2="178" stroke="#0a2540" stroke-width="1.5"/>
<text x="600" y="197" class="sub" text-anchor="middle">Cargo moves in both directions</text>

<g>
<circle cx="230" cy="150" r="13" fill="#0a2540"/><circle cx="230" cy="150" r="5" fill="#fff"/>
<text x="230" y="90" class="kick" text-anchor="middle">WEST COAST</text>
<text x="230" y="112" class="hd" text-anchor="middle">Port Klang</text>
<text x="230" y="240" class="sub" text-anchor="middle">Selangor</text>
<text x="230" y="258" class="sub" text-anchor="middle">Mainline / transhipment gateway</text>
</g>
<g>
<circle cx="970" cy="150" r="13" fill="#0a2540"/><circle cx="970" cy="150" r="5" fill="#fff"/>
<text x="970" y="90" class="kick" text-anchor="middle">EAST COAST</text>
<text x="970" y="112" class="hd" text-anchor="middle">Kuantan Port</text>
<text x="970" y="240" class="sub" text-anchor="middle">Pahang</text>
<text x="970" y="258" class="sub" text-anchor="middle">South China Sea gateway</text>
</g>

<rect x="230" y="286" width="740" height="30" rx="2" fill="#0a2540"/>
<text x="600" y="306" class="band" text-anchor="middle" fill="#fff">ONE BILL OF LADING · ONE OPERATOR · ONE POINT OF ACCOUNTABILITY</text>
</svg>
